<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><title>❤️</title><style>body{margin:0;background:#4169E1;font-family:Arial;color:white;text-align:center;overflow-x:hidden;overflow-y:auto;} .container{padding:30px;margin-bottom:100px;} .texto{font-size:24px;line-height:1.8;max-width:700px;margin:40px auto;padding:20px;background: rgba(255,255,255,0.1);border-radius:20px;text-align:center;} #contador{font-size:24px;margin-top:25px;} #secreto{position:fixed;bottom:10px;right:10px;background:transparent;border:none;font-size:20px;opacity:0.3;}</style></head><body><div class='container'><p id='texto' class='texto'></p><div id='contador'></div></div><button id='secreto' onclick='irMusica()'>🎁</button><script>const mensagem='Eu te amo ❤️';let i=0;function digitar(){if(i<mensagem.length){document.getElementById('texto').innerHTML+=mensagem.charAt(i);i++;setTimeout(digitar,30);}}digitar();const dataInicio=new Date('2026-02-15');function atualizarContador(){const agora=new Date();const diff=agora-dataInicio;const dias=Math.floor(diff/(1000*60*60*24));document.getElementById('contador').innerHTML='💖 '+dias+' dias juntos';}setInterval(atualizarContador,1000);function irMusica(){window.location.href='musica.html';}</script></body></html>
