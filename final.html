<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>❤️</title>

<style>

body{
margin:0;
background:#4169E1;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
overflow-y:auto;
}

.container{
padding:30px;
margin-bottom:120px;
}

.texto{
font-size:24px;
line-height:1.8;
max-width:700px;
margin:40px auto;
padding:20px;

background: rgba(255,255,255,0.1);
border-radius:20px;

text-align:center;

box-shadow: 0 0 20px rgba(0,0,0,0.2);
backdrop-filter: blur(5px);
}

#contador{
font-size:24px;
margin-top:25px;
}

/* ❤️ corações */
.coracao{
position:absolute;
top:-10px;
animation:cair linear infinite;
}

@keyframes cair{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

/* 💌 subindo */
.amor{
position:absolute;
bottom:-20px;
font-size:14px;
animation:subir linear infinite;
}

@keyframes subir{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

/* 🎁 botão secreto */
#secreto{
position:fixed;
bottom:15px;
right:15px;
background:transparent;
border:none;
font-size:22px;
opacity:0.2;
}

</style>
</head>

<body>

<div class="container">

<p id="texto" class="texto"></p>

<div id="contador"></div>

</div>

<!-- botão secreto -->
<button id="secreto" onclick="irMusica()">🎁</button>

<script>

// 💬 TEXTO EM FORMATO CARTA
const mensagem = `SIMMMMMMM MEU AMOR ❤️

ESTAMOS COMPLETANDO 2 MESES JUNTOS...

E ESTOU SUPER FELIZ, DE VERDADE.

VOCÊ FOI A MELHOR COISA QUE ACONTECEU NA MINHA VIDA.

DESDE QUE TE CONHECI, MINHA VIDA MUDOU MUITO, PRA MELHOR.

E DESDE ENTÃO VENHO SENDO FELIZ DIARIAMENTE...

MESMO ATRAVÉS DE UMA TELA, SOU MUITO FELIR POR TER VC MEU AMOR❤️

MEU DIA JA FICA PERFEITO QUANDO RECEBO UMA MENSAGEM SUA MEU AMOR

ALEGRA 100% A MINHA VIDA DE UM JEITO INEXPLICÁVEL

EU TE AMO MUITOO MEU AMOR, VC FOI A MINHA MELHOR ESCOLHA🥺💗

TÔ DANDO O MEU MÁXIMO PARA VC MEU AMOR

AS VEZES NÃO SEI ME EXPRESSAR DIREITO

MAIS DOU O MEU MÁXIMO POR VOCÊ MEU AMOR🥺

E SEMPRE VOU TENTAR MELHORAR CADA VEZ MAIS POR VC MEU BB

EU DOU SORRISINHOS BOBOS QUANDO PENSO EM VC, É AUTOMÁTICO 💭

EU COMEÇO A CHORAR QUANDO PENSO NK FUTURO E IMAGINO SEM VC

EU REALMENTE QUERO QUE SEJA VC MEU AMOR, DE VERDADE🥺

VOCÊ É PERFEITA MEU AMOR...

VC É A PESSOA MAIS INCRÍVEL QUE JA ENTROU NA MINHA VIDA💗

VOCÊ É FORTE, CORAJOSA...

E MUITOOOO LINDAAAAAAA 😍

MARAVILHOSAAAAAAAA...

E SUPER FOFINHA 🥺

AMO SEU OLHINHO, SUA BOCA...

AMO CADA PEDACINHO SEU💗

AMO TUDO EM VOCÊ 💖

AMO QUANDO VC COMPARTILHA SEU DIA CMG

AMO TUDOOOO QUE VC FAZ MEU AMOOOR, TUDOOOOO

OBGDUU POR SER ESSA PESSOA MARAVILHOSA 

NUNCA VOU ME ARREPENDER DE TER TE CONHECIDO.

ESPERO QUE A GENTE DÊ CERTO, DE VERDADE 🙏

ORO TODOS OS DIAS PARA DEUS TE PROTEGER E TE DAR SAÚDE.

E QUE UM DIA A GENTE POSSA VIVER JUNTOS 💑

EU TE AMOOOOOOO MUITO MEU AMOR...

COM TODA MINHA ALMA 💗

INFINITAMENTE 💗💗

PRA SEMPREEEEEEE MEU AMOR💗💗💗

NÃO ESQUEÇA DISSO💗🫶🏼

E NÃO ESQUECE DE BEBER ÁGUA MEU AMOOR

E SE ESQUECER EU TE LEMBROOO, C CUIDA MEU AMOOR`;

// ⌨️ efeito digitando
let i = 0;
function digitar(){
if(i < mensagem.length){
document.getElementById("texto").innerHTML += mensagem.charAt(i) === "\n" ? "<br>" : mensagem.charAt(i);
i++;
setTimeout(digitar, 25);
}
}
digitar();


// ⏱️ CONTADOR (ALTERA A DATA AQUI)
const dataInicio = new Date("2026-02-15 00:00:00");

function atualizarContador(){
const agora = new Date();
const diff = agora - dataInicio;

const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
const minutos = Math.floor((diff / (1000 * 60)) % 60);
const segundos = Math.floor((diff / 1000) % 60);

document.getElementById("contador").innerHTML =
`💖 Estamos juntos há ${dias} dias, ${horas} horas, ${minutos} minutos e ${segundos} segundos`;
}

setInterval(atualizarContador, 1000);


// ❤️ corações caindo (otimizado)
setInterval(()=>{
let coracao = document.createElement("div");
coracao.classList.add("coracao");
coracao.innerHTML = "❤️";
coracao.style.left = Math.random() * 100 + "vw";
coracao.style.animationDuration = (4 + Math.random()*4) + "s";
document.body.appendChild(coracao);

setTimeout(()=>{coracao.remove();}, 8000);

}, 400);


// 💌 eu te amo subindo
setInterval(()=>{
let amor = document.createElement("div");
amor.classList.add("amor");
amor.innerHTML = "Eu te amo ❤️";
amor.style.left = Math.random() * 100 + "vw";
amor.style.animationDuration = (5 + Math.random()*5) + "s";
document.body.appendChild(amor);

setTimeout(()=>{amor.remove();}, 10000);

}, 700);


// 🎁 botão secreto
function irMusica(){
window.location.href = "musica.html";
}

</script>

</body>
</html>
