<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🎧 Raindance</title>

<style>

body{
margin:0;
background:#121212;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

/* player */
.player{
text-align:center;
width:90%;
max-width:400px;
}

/* capa */
.capa{
width:250px;
height:250px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* textos */
.titulo{
font-size:18px;
font-weight:bold;
}

.artista{
font-size:14px;
color:#aaa;
margin-bottom:20px;
}

/* letra */
#letra{
margin-top:20px;
font-size:22px;
line-height:1.6;
height:100px;
display:flex;
align-items:center;
justify-content:center;
transition:0.4s;
}

.ativa{
font-size:26px;
color:#1DB954;
font-weight:bold;
transform:scale(1.1);
}

audio{
width:100%;
margin-top:20px;
}

</style>

</head>

<body>

<div class="player">

<img src="capa.jpg" class="capa">

<div class="titulo">Raindance 💖</div>
<div class="artista">Dave ft. Tems</div>

<div id="letra">💖</div>

<audio id="audio" controls autoplay>
<source src="musica.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const audio = document.getElementById("audio");
const letra = document.getElementById("letra");

// ⏱️ COMEÇAR EM 50 SEGUNDOS
audio.addEventListener("loadedmetadata", () => {
audio.currentTime = 50;
});


// 🎯 SINCRONIZAÇÃO (AJUSTE OS TEMPOS CONFORME OUVE)
const letras = [
{tempo: 50, texto: "💭 ..."},
{tempo: 54, texto: "💭 ..."},
{tempo: 58, texto: "💭 ..."},
{tempo: 62, texto: "💭 ..."},
{tempo: 66, texto: "💭 ..."},
{tempo: 70, texto: "💭 ..."},
{tempo: 75, texto: "💭 ..."},
{tempo: 80, texto: "💭 ..."}
];

audio.ontimeupdate = () => {
let tempoAtual = audio.currentTime;

for(let i = 0; i < letras.length; i++){
if(tempoAtual >= letras[i].tempo){
letra.innerHTML = letras[i].texto;
letra.classList.add("ativa");

setTimeout(()=>{
letra.classList.remove("ativa");
}, 300);
}
}
};

</script>

</body>
</html>
