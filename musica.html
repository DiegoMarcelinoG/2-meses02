<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🎧 Raindance</title>

<style>

body{
margin:0;
background:#121212;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

/* player */
.player{
text-align:center;
width:90%;
max-width:400px;
}

/* capa */
.capa{
width:250px;
height:250px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* textos */
.titulo{
font-size:18px;
font-weight:bold;
}

.artista{
font-size:14px;
color:#aaa;
margin-bottom:20px;
}

/* letra */
#letra{
margin-top:20px;
font-size:22px;
line-height:1.6;
height:100px;
display:flex;
align-items:center;
justify-content:center;
transition:0.4s;
}

.ativa{
font-size:26px;
color:#1DB954;
font-weight:bold;
transform:scale(1.1);
}

audio{
width:100%;
margin-top:20px;
}

</style>

</head>

<body>

<div class="player">

<img src="capa.jpg" class="capa">

<div class="titulo">Raindance 💖</div>
<div class="artista">Dave ft. Tems</div>

<div id="letra">💖</div>

<audio id="audio" controls autoplay>
<source src="musica.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const audio = document.getElementById("audio");
const letra = document.getElementById("letra");

// ⏱️ COMEÇAR EM 50 SEGUNDOS
audio.addEventListener("loadedmetadata", () => {
audio.currentTime = 50;
});


// 🎯 SINCRONIZAÇÃO (AJUSTE OS TEMPOS CONFORME OUVE)
const letras = [
{tempo: 50, texto: "💭 i'im let you catch up with you boy, undress you, and let me tell you why i'am bless you"},
{tempo: 54, texto: "💭 it's the way my mind's falling' away"},
{tempo: 58, texto: "💭 in my heart, i know you feel the same"},
{tempo: 62, texto: "💭 when you're tith me, you know i'im all you need"},
{tempo: 66, texto: "💭 you're where i wanna be, my darling, cant't you see?"},
{tempo: 70, texto: "💭 I love you"},
{tempo: 75, texto: "💭 I love you"},
{tempo: 80, texto: "💭 I love you"},
{tempo: 85, texto: "💭 I love"},
{tempo: 89, texto: "💭 still into you"},
{tempo: 93, texto: "💭 say you want me in the mood, tryna hide my feelings for you"},
{tempo: 97, texto: "💭 Don't wanna argue, not with you, tell me why you're so in denial "},
{tempo: 101, texto: "💭 Hold me close, don't tell me goodnight, Are you down to get me?"},
{tempo: 105, texto: "💭 tell me when you're ready (uh), i'm ready"},
];

audio.ontimeupdate = () => {
let tempoAtual = audio.currentTime;

for(let i = 0; i < letras.length; i++){
if(tempoAtual >= letras[i].tempo){
letra.innerHTML = letras[i].texto;
letra.classList.add("ativa");

setTimeout(()=>{
letra.classList.remove("ativa");
}, 300);
}
}
};

</script>

</body>
</html>
